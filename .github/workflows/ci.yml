name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, "devops/**", "feat/**"]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install ruff

      - run: ruff check backend/
